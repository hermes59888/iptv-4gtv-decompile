<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>线上播放器</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            padding: 1rem;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Roboto, Arial, sans-serif;
        }
        .player-container { max-width: 1200px; margin: 0 auto; }
        .video-container { position: relative; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
        #videoPlayer { width: 100%; height: auto; max-height: 70vh; background: #000; }
        .controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.75); padding: 10px; border-radius: 5px; opacity: 0; transition: opacity 0.3s; gap: 8px; flex-wrap: wrap; }
        .video-container:hover .controls { opacity: 1; }
        .playlist-info, .playing-info { background: #2a2a2a; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .channel-list { max-height: 400px; overflow-y: auto; background: #2a2a2a; border-radius: 8px; padding: 0.5rem; }
        .channel-item { padding: 0.75rem; border-bottom: 1px solid #444; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .channel-item:hover { background-color: #3a3a3a; }
        .channel-item.active { background-color: #4a76b8; }
        .channel-logo { max-width: 100px; max-height: 30px; width: auto; height: auto; margin-right: 10px; border-radius: 5px; display: block; }
        .channel-info { flex: 1; }
        .channel-name { font-weight: bold; margin-bottom: 2px; font-size: 1.1rem; }
        .channel-group { font-size: 0.85rem; color: #ccc; margin-top: 4px; }
        .loading-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.7); padding: 1rem 2rem; border-radius: 12px; z-index: 25; text-align: center; }
        .btn-player, .quality-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-player:hover, .quality-btn:hover { background: rgba(255,255,255,0.4); }
        .quality-btn { width: auto; border-radius: 20px; padding: 0 15px; gap: 5px; }
        .volume-control, .brightness-control { display: flex; align-items: center; gap: 5px; width: 130px; }
        .brightness-slider, .volume-control .form-range { width: 100px; }
        .form-range { cursor: pointer; }
        .protocol-indicator { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; z-index: 20; }
        .quality-selector { position: relative; display: inline-block; }
        .quality-dropdown { display: none; position: absolute; bottom: 100%; left: 0; background: #1e1e1e; border-radius: 8px; padding: 0.5rem; min-width: 140px; z-index: 1000; border: 1px solid #555; margin-bottom: 8px; }
        .quality-dropdown.show { display: block; }
        .quality-option { padding: 0.5rem; cursor: pointer; border-radius: 5px; color: #ddd; }
        .quality-option:hover { background: #4a76b8; color: white; }
        .quality-option.active { background: #4a76b8; color: white; font-weight: bold; }
        .status-indicator { padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; margin-bottom: 1rem; }
        .status-loading { background: #ffc107; color: #000; }
        .status-ready { background: #198754; color: white; }
        .status-error { background: #dc3545; color: white; }
        .channel-group-btn, .vod-group-btn { width: 100%; padding: 0.75rem; background: #3a3a3a; border: none; border-radius: 5px; color: white; text-align: left; cursor: pointer; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
        .channel-group-content, .vod-group-content { display: none; margin-bottom: 0.5rem; }
        .channel-group-content.show, .vod-group-content.show { display: block; }
        .channel-group-icon, .vod-group-icon { transition: transform 0.2s; }
        .channel-group-btn.active .channel-group-icon, .vod-group-btn.active .vod-group-icon { transform: rotate(90deg); }
        .live-badge, .vod-badge { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 12px; margin-left: 0.5rem; }
        .live-badge { background: #dc3545; }
        .vod-badge { background: #198754; }
        .channel-type-btn { width: 100%; padding: 0.75rem; background: #3a3a3a; border: none; border-radius: 5px; color: white; text-align: left; margin-bottom: 0.5rem; display: flex; justify-content: space-between; cursor: pointer; }
        .channel-type-btn.active { background: #4a76b8; }
        .auto-play-control { display: flex; align-items: center; margin-top: 1rem; padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .auto-play-label { margin-left: 0.5rem; font-size: 0.9rem; }
        .next-episode-info { margin-top: 0.5rem; padding: 0.75rem; background: rgba(74,118,184,0.2); border-radius: 8px; border-left: 3px solid #4a76b8; }
        .countdown-indicator { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; z-index: 20; display: none; }
    </style>
</head>
<body>
<div class="player-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">线上播放器</h2>
        <a href="/config/mappings" class="btn btn-outline-light">返回</a>
    </div>
    <div class="playlist-info">
        <label class="form-label text-white">播放模式</label>
        <select id="playlistSelect" class="form-select bg-dark text-white"></select>
    </div>
    <div class="row">
        <div class="col-md-8">
            <div class="video-container">
                <div class="protocol-indicator" id="protocolIndicator">HTTPS</div>
                <div class="countdown-indicator" id="countdownIndicator">下一集: <span id="countdownText">5</span>秒</div>
                <video id="videoPlayer" playsinline></video>
                <div class="loading-indicator" id="loadingIndicator" style="display: none;"><div class="spinner-border text-primary"></div><p class="mt-2">加载中...</p></div>
                <div class="controls">
                    <button class="btn-player" id="playPauseBtn"><i class="bi bi-play-fill" id="playIcon"></i></button>
                    <div class="volume-control"><button class="btn-player" id="muteBtn"><i class="bi bi-volume-up-fill" id="volumeIcon"></i></button><input type="range" id="volumeSlider" class="form-range" min="0" max="1" step="0.05" value="1"></div>
                    <div class="brightness-control"><button class="btn-player" id="brightnessBtn"><i class="bi bi-brightness-high-fill brightness-icon"></i></button><input type="range" id="brightnessSlider" class="brightness-slider form-range" min="0" max="2" step="0.05" value="1"></div>
                    <div style="flex:1; min-width: 100px;"><input type="range" id="progressBar" class="form-range" min="0" max="100" value="0"></div>
                    <div class="quality-selector" id="qualitySelector" style="display: none;">
                        <button class="quality-btn" id="qualityBtn"><i class="bi bi-gear-fill"></i> 画质</button>
                        <div class="quality-dropdown" id="qualityDropdown"></div>
                    </div>
                    <button class="btn-player" id="fullscreenBtn"><i class="bi bi-arrows-fullscreen"></i></button>
                </div>
            </div>
            <div id="statusIndicator" class="status-indicator status-ready">就绪</div>
            <div class="playing-info" id="playingInfo" style="display: none;">
                <div class="d-flex align-items-center"><img id="currentChannelLogo" style="width:48px;height:32px;object-fit:contain;margin-right:10px;"><div><strong id="currentChannelName"></strong><br><small id="currentChannelGroup" class="text-muted"></small></div></div>
                <div class="auto-play-control"><input type="checkbox" id="autoPlayNext" checked> <label class="ms-2">自动播放下一集</label></div>
                <div id="nextEpisodeInfo" style="display: none;"><div id="nextEpisodeTitle"></div></div>
            </div>
        </div>
        <div class="col-md-4">
            <h5>频道列表 <span id="channelCount" class="badge bg-primary">0</span></h5>
            <input type="text" id="searchInput" class="form-control bg-dark text-white mt-2" placeholder="搜寻频道">
            <div class="mt-2">
                <button class="channel-type-btn active" id="liveChannelsBtn" onclick="window.switchChannelType('live')"><span>📺 直播</span><span id="liveChannelCount" class="badge bg-secondary">0</span></button>
                <button class="channel-type-btn" id="vodChannelsBtn" onclick="window.switchChannelType('vod')"><span>🎬 点播</span><span id="vodChannelCount" class="badge bg-secondary">0</span></button>
            </div>
            <div class="channel-list mt-2" id="channelList">请选择播放模式</div>
        </div>
    </div>
</div>

<script>
    // ==================== 全局变量 ====================
    let hls = null;
    let allChannels = [];
    let liveChannels = [];
    let vodChannels = [];
    let filteredLive = [];
    let filteredVod = [];
    let currentChannelType = 'live';
    let currentChannelIndex = -1;
    let currentChannelGroup = '';
    let autoPlayNext = true;
    let countdownTimer = null;
    let originalMasterUrl = '';
    let fallbackAttempted = false;
    let currentProtocol = 'https';
    let qualityLevels = [];
    let currentChannelNameForQuality = '';
    let expandedGroups = new Set();
    let expandedVodGroups = new Set();
    const video = document.getElementById('videoPlayer');
    const progressBar = document.getElementById('progressBar');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const statusDiv = document.getElementById('statusIndicator');
    const qualitySelectorDiv = document.getElementById('qualitySelector');
    const qualityDropdown = document.getElementById('qualityDropdown');
    const qualityBtn = document.getElementById('qualityBtn');

    // 画质按钮点击切换下拉菜单
    if (qualityBtn) {
        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityDropdown.classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!qualitySelectorDiv.contains(e.target)) qualityDropdown.classList.remove('show');
        });
        qualityDropdown.addEventListener('click', (e) => e.stopPropagation());
    }

    // 获取当前码率标签
    function getCurrentQualityLabel() {
        if (!hls || !hls.levels || hls.levels.length === 0) return '自动';
        const level = hls.currentLevel;
        if (level === -1) {
            return '自动';
        }
        const height = hls.levels[level]?.height;
        if (!height) return '自动';
        if (height <= 360) return '流畅360P';
        if (height <= 480) return '标准480P';
        if (height <= 720) return '清晰720P';
        if (height <= 1080) return '精緻1080P';
        return height + 'p';
    }

    // 更新状态栏，显示频道名和当前码率
    function updateStatusWithQuality() {
        const qualityLabel = getCurrentQualityLabel();
        updateStatus('ready', `${currentChannelNameForQuality} (${qualityLabel})`);
    }

    // ==================== 画质选择器核心 ====================
    function updateQualitySelector(levels) {
        if (!levels || levels.length <= 1) {
            qualitySelectorDiv.style.display = 'none';
            console.log('[画质] 单码率，隐藏选择器');
            return;
        }
        qualitySelectorDiv.style.display = 'inline-block';
        qualityLevels = levels;
        qualityDropdown.innerHTML = '';
        const sorted = [...levels].sort((a,b) => a.bandwidth - b.bandwidth);
        const qualityMap = new Map();
        for (let idx = 0; idx < sorted.length; idx++) {
            const level = sorted[idx];
            const originalIdx = levels.indexOf(level);
            let label = '自动';
            if (level.height) {
                const height = level.height;
                if (height <= 360) label = '流畅360P';
                else if (height <= 480) label = '标准480P';
                else if (height <= 720) label = '清晰720P';
                else if (height <= 1080) label = '精緻1080P';
                else label = height + 'p';
            }
            if (!qualityMap.has(label) || level.bandwidth > qualityMap.get(label).bandwidth) {
                qualityMap.set(label, { levelIndex: originalIdx, height: level.height });
            }
        }
        const order = ['360p','480p','720p','1080p','1440p','2160p'];
        const labels = Array.from(qualityMap.keys()).sort((a,b) => order.indexOf(a) - order.indexOf(b));
        const autoOpt = document.createElement('div');
        autoOpt.className = 'quality-option';
        autoOpt.textContent = '自动';
        autoOpt.addEventListener('click', (e) => {
            e.stopPropagation();
            if (hls) {
                hls.currentLevel = -1;
                setActiveQuality('自动');
                updateStatusWithQuality();
            }
            qualityDropdown.classList.remove('show');
        });
        qualityDropdown.appendChild(autoOpt);
        for (let label of labels) {
            const info = qualityMap.get(label);
            const opt = document.createElement('div');
            opt.className = 'quality-option';
            opt.textContent = label.toUpperCase();
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                if (hls) {
                    hls.currentLevel = info.levelIndex;
                    setActiveQuality(label);
                    updateStatusWithQuality();
                }
                qualityDropdown.classList.remove('show');
            });
            qualityDropdown.appendChild(opt);
        }
        console.log('[画质] 菜单构建完成，选项:', labels.join(', '));
        setActiveQuality('自动');
    }

    function setActiveQuality(activeLabel) {
        const opts = qualityDropdown.querySelectorAll('.quality-option');
        opts.forEach(opt => {
            if (opt.textContent.trim().toLowerCase() === activeLabel.toLowerCase()) opt.classList.add('active');
            else opt.classList.remove('active');
        });
    }

    // ==================== 播放频道核心 ====================
    async function playChannel(url, name, group, logo, tvgId, index, type) {
        console.log('[播放] 开始:', name, url);
        loadingIndicator.style.display = 'block';
        fallbackAttempted = false;
        originalMasterUrl = url;
        currentChannelNameForQuality = name;
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.currentTime = 0;
        progressBar.value = 0;
        updateStatus('loading', `加载 ${name}...`);
        clearCountdown();
        currentChannelIndex = index;
        currentChannelGroup = group;
        currentChannelType = type;
        document.getElementById('currentChannelName').innerText = name;
        document.getElementById('currentChannelGroup').innerText = group || '';
        const logoImg = document.getElementById('currentChannelLogo');
        if (logo && logo.trim()) { logoImg.src = logo; logoImg.style.display = 'block'; } else logoImg.style.display = 'none';
        document.getElementById('playingInfo').style.display = 'block';
        updateProtocolIndicator('https');
        // 高亮频道
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        const items = document.querySelectorAll('.channel-item');
        for (let i=0; i<items.length; i++) {
            if (items[i].getAttribute('data-url') === url) {
                items[i].classList.add('active');
                break;
            }
        }
        updateNextEpisodeInfo();

        const httpsUrl = ensureHttps(url);
        if (!Hls.isSupported()) {
            updateStatus('error', '浏览器不支持HLS');
            loadingIndicator.style.display = 'none';
            return;
        }
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            loadingIndicator.style.display = 'none';
            updateStatusWithQuality();  // 显示当前码率
            video.play().catch(e => console.log('自动播放被阻止，可手动点击'));
            if (data.levels && data.levels.length > 1) {
                updateQualitySelector(data.levels);
            } else {
                qualitySelectorDiv.style.display = 'none';
            }
        });
        hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
            updateStatusWithQuality();  // 码率切换时更新状态栏
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('HLS错误:', data);
            if (data.fatal && currentProtocol === 'https' && !fallbackAttempted) {
                fallbackAttempted = true;
                const httpUrl = ensureHttp(originalMasterUrl);
                updateProtocolIndicator('http');
                hls.loadSource(httpUrl);
                hls.startLoad();
            } else if (data.fatal) {
                loadingIndicator.style.display = 'none';
                updateStatus('error', 'HLS错误');
            }
        });
        hls.loadSource(httpsUrl);
    }

    // ==================== 辅助函数 ====================
    function updateStatus(type, msg) {
        statusDiv.className = 'status-indicator ' + (type === 'loading' ? 'status-loading' : (type === 'ready' ? 'status-ready' : 'status-error'));
        statusDiv.innerHTML = `<i class="bi ${type==='loading'?'bi-arrow-repeat spinner-border spinner-border-sm':(type==='ready'?'bi-check-circle':'bi-exclamation-triangle')}"></i> ${msg}`;
    }
    function ensureHttps(u) { return u?.startsWith('http://') ? u.replace('http://','https://') : u; }
    function ensureHttp(u) { return u?.startsWith('https://') ? u.replace('https://','http://') : u; }
    function updateProtocolIndicator(p) { currentProtocol = p; let el = document.getElementById('protocolIndicator'); el.innerText = p.toUpperCase(); el.style.backgroundColor = p==='https'?'#2a7a2a':'#a33'; }

    video.addEventListener('loadedmetadata', () => { if(video.duration) progressBar.value = (video.currentTime/video.duration)*100; });
    video.addEventListener('timeupdate', () => { if(video.duration) progressBar.value = (video.currentTime/video.duration)*100; });
    progressBar.addEventListener('input', (e) => { if(video.duration) video.currentTime = video.duration * (e.target.value/100); });

    // 下一集逻辑
    function findNextChannelInGroup() {
        if (currentChannelIndex === -1 || !currentChannelGroup) return null;
        let list = currentChannelType === 'live' ? filteredLive : filteredVod;
        let groupChannels = list.filter(ch => ch.group === currentChannelGroup);
        if (groupChannels.length <= 1) return null;
        let cur = list[currentChannelIndex];
        let idx = groupChannels.findIndex(ch => ch.url === cur.url);
        if (idx === -1 || idx >= groupChannels.length - 1) return null;
        return groupChannels[idx + 1];
    }
    function updateNextEpisodeInfo() {
        let next = findNextChannelInGroup();
        let el = document.getElementById('nextEpisodeInfo');
        if (next) { document.getElementById('nextEpisodeTitle').innerText = `下一集: ${next.name}`; el.style.display = 'block'; }
        else el.style.display = 'none';
    }
    function startCountdown() {
        clearCountdown();
        if (!autoPlayNext) return;
        let next = findNextChannelInGroup();
        if (!next) return;
        let seconds = 5;
        let cdDiv = document.getElementById('countdownIndicator'), span = document.getElementById('countdownText');
        let update = () => { span.innerText = seconds; cdDiv.style.display = 'block'; };
        update();
        countdownTimer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearCountdown();
                let nxt = findNextChannelInGroup();
                if (nxt) {
                    let list = currentChannelType === 'live' ? filteredLive : filteredVod;
                    let idx = list.findIndex(ch => ch.url === nxt.url);
                    if (idx !== -1) playChannel(nxt.url, nxt.name, nxt.group, nxt.logo, nxt.tvgId, idx, currentChannelType);
                }
            } else { span.innerText = seconds; }
        }, 1000);
    }
    function clearCountdown() { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } document.getElementById('countdownIndicator').style.display = 'none'; }
    function playPreviousChannel() {
        let list = currentChannelType === 'live' ? filteredLive : filteredVod;
        if (!list.length) return;
        let newIdx = currentChannelIndex - 1;
        if (newIdx < 0) newIdx = list.length - 1;
        let ch = list[newIdx];
        playChannel(ch.url, ch.name, ch.group, ch.logo, ch.tvgId, newIdx, currentChannelType);
    }
    function playNextChannel() {
        let list = currentChannelType === 'live' ? filteredLive : filteredVod;
        if (!list.length) return;
        let newIdx = currentChannelIndex + 1;
        if (newIdx >= list.length) newIdx = 0;
        let ch = list[newIdx];
        playChannel(ch.url, ch.name, ch.group, ch.logo, ch.tvgId, newIdx, currentChannelType);
    }

    // ==================== 频道列表渲染 ====================
    function renderLiveChannels() {
        let container = document.getElementById('channelList');
        if (!filteredLive.length) { container.innerHTML = '<div class="text-muted text-center">无直播频道</div>'; return; }
        let groups = new Map();
        filteredLive.forEach((ch, idx) => { let g = ch.group?.trim() || '未分组'; if(!groups.has(g)) groups.set(g, []); groups.get(g).push({...ch, idx}); });
        let html = '';
        for (let [gName, chs] of groups.entries()) {
            let expanded = expandedGroups.has(gName);
            html += `<button class="channel-group-btn ${expanded?'active':''}" data-group="${gName}"><span>${gName}</span><span><span class="badge bg-secondary me-2">${chs.length}</span><i class="bi bi-chevron-right channel-group-icon"></i></span></button>
                     <div class="channel-group-content ${expanded?'show':''}" id="group-${gName}">`;
            chs.forEach(ch => {
                let logoHtml = ch.logo ? `<img src="${ch.logo}" class="channel-logo" onerror="this.style.display='none'">` : `<div style="width:40px;height:30px;background:#555;margin-right:10px;border-radius:4px;"></div>`;
                html += `<div class="channel-item" data-url="${escapeHtml(ch.url)}" data-name="${escapeHtml(ch.name)}" data-group="${escapeHtml(ch.group||'')}" data-logo="${escapeHtml(ch.logo||'')}" data-tvgid="${escapeHtml(ch.tvgId||'')}" data-idx="${ch.idx}" data-type="live">
                            ${logoHtml}<div><strong>${escapeHtml(ch.name)}</strong> <span class="live-badge">直播</span><br><small>${escapeHtml(ch.group||'')}</small></div>
                         </div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.channel-group-btn').forEach(btn => btn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleGroup(btn.getAttribute('data-group')); }));
    }
    function renderVodChannels() {
        let container = document.getElementById('channelList');
        if (!filteredVod.length) { container.innerHTML = '<div class="text-muted text-center">无点播频道</div>'; return; }
        let groups = new Map();
        filteredVod.forEach((ch, idx) => { let g = ch.group?.trim() || '未分组'; if(!groups.has(g)) groups.set(g, []); groups.get(g).push({...ch, idx}); });
        let html = '';
        for (let [gName, chs] of groups.entries()) {
            let expanded = expandedVodGroups.has(gName);
            html += `<button class="vod-group-btn ${expanded?'active':''}" data-group="${gName}"><span>${gName}</span><span><span class="badge bg-secondary me-2">${chs.length}</span><i class="bi bi-chevron-right vod-group-icon"></i></span></button>
                     <div class="vod-group-content ${expanded?'show':''}" id="vod-group-${gName}">`;
            chs.forEach(ch => {
                let logoHtml = ch.logo ? `<img src="${ch.logo}" class="channel-logo" onerror="this.style.display='none'">` : `<div style="width:40px;height:30px;background:#555;margin-right:10px;border-radius:4px;"></div>`;
                html += `<div class="channel-item" data-url="${escapeHtml(ch.url)}" data-name="${escapeHtml(ch.name)}" data-group="${escapeHtml(ch.group||'')}" data-logo="${escapeHtml(ch.logo||'')}" data-tvgid="${escapeHtml(ch.tvgId||'')}" data-idx="${ch.idx}" data-type="vod">
                            ${logoHtml}<div><strong>${escapeHtml(ch.name)}</strong> <span class="vod-badge">点播</span><br><small>${escapeHtml(ch.group||'')}</small></div>
                         </div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.vod-group-btn').forEach(btn => btn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleVodGroup(btn.getAttribute('data-group')); }));
    }
    function toggleGroup(g) { let div = document.getElementById(`group-${g}`); let btn = document.querySelector(`.channel-group-btn[data-group="${g}"]`); if(div.classList.contains('show')){ div.classList.remove('show'); btn.classList.remove('active'); expandedGroups.delete(g); } else { div.classList.add('show'); btn.classList.add('active'); expandedGroups.add(g); } }
    function toggleVodGroup(g) { let div = document.getElementById(`vod-group-${g}`); let btn = document.querySelector(`.vod-group-btn[data-group="${g}"]`); if(div.classList.contains('show')){ div.classList.remove('show'); btn.classList.remove('active'); expandedVodGroups.delete(g); } else { div.classList.add('show'); btn.classList.add('active'); expandedVodGroups.add(g); } }
    function switchChannelType(type) {
        currentChannelType = type;
        document.getElementById('liveChannelsBtn').classList.toggle('active', type==='live');
        document.getElementById('vodChannelsBtn').classList.toggle('active', type==='vod');
        if(type==='live') renderLiveChannels(); else renderVodChannels();
    }
    function searchChannels() {
        let term = document.getElementById('searchInput').value.toLowerCase().trim();
        if(!term){ filteredLive = [...liveChannels]; filteredVod = [...vodChannels]; }
        else { filteredLive = liveChannels.filter(ch=>ch.name.toLowerCase().includes(term)||(ch.group||'').toLowerCase().includes(term)); filteredVod = vodChannels.filter(ch=>ch.name.toLowerCase().includes(term)||(ch.group||'').toLowerCase().includes(term)); }
        switchChannelType(currentChannelType);
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;').replace(/'/g, "\\'"); }

    // 频道点击事件委托
    document.getElementById('channelList').addEventListener('click', (e) => {
        const item = e.target.closest('.channel-item');
        if (!item) return;
        const url = item.getAttribute('data-url');
        const name = item.getAttribute('data-name');
        const group = item.getAttribute('data-group');
        const logo = item.getAttribute('data-logo');
        const tvgId = item.getAttribute('data-tvgid');
        const idx = parseInt(item.getAttribute('data-idx'));
        const type = item.getAttribute('data-type');
        if (url && name) {
            playChannel(url, name, group, logo, tvgId, idx, type);
        }
    });

    // ==================== 加载播放列表====================
    async function loadPlaylist(filename) {
        if(window.currentPlaylist === filename) return;
        window.currentPlaylist = filename;
        updateStatus('loading', '加载列表...');
        try {
            let res = await fetch(`/api/playlist-content?filename=${encodeURIComponent(filename)}`);
            let data = await res.json();
            if(data.error) throw new Error(data.error);
            allChannels = data.channels;
            liveChannels = allChannels.filter(ch => !ch.url.includes('episode_id') && !ch.name.includes('点播') && !ch.name.includes('ofiii') && (!ch.group || !ch.group.includes('点播')));
            vodChannels = allChannels.filter(ch => ch.url.includes('episode_id') || ch.name.includes('点播') || ch.name.includes('ofiii') || (ch.group && ch.group.includes('点播')));
            filteredLive = [...liveChannels]; filteredVod = [...vodChannels];
            document.getElementById('channelCount').innerText = allChannels.length;
            document.getElementById('liveChannelCount').innerText = liveChannels.length;
            document.getElementById('vodChannelCount').innerText = vodChannels.length;
            switchChannelType('live');
            updateStatus('ready', `已加载 ${allChannels.length} 频道`);
        } catch(e) { updateStatus('error', e.message); }
    }
    async function loadPlaylistOptions() {
        let sel = document.getElementById('playlistSelect');
        sel.innerHTML = '';
        ['normal_mode', 'proxy_mode'].forEach(v => { let o = document.createElement('option'); o.value=v; o.textContent = v==='normal_mode'?'M3U8代理':'完整流媒体代理'; sel.appendChild(o); });
        await loadPlaylist('normal_mode');
        sel.addEventListener('change', () => loadPlaylist(sel.value));
    }

    // ==================== 事件绑定 ====================
    document.addEventListener('DOMContentLoaded', () => {
        loadPlaylistOptions();
        document.getElementById('playPauseBtn').addEventListener('click', () => video.paused ? video.play() : video.pause());
        video.addEventListener('play', () => document.getElementById('playIcon').className = 'bi bi-pause-fill');
        video.addEventListener('pause', () => document.getElementById('playIcon').className = 'bi bi-play-fill');
        video.addEventListener('ended', () => { if(autoPlayNext) startCountdown(); });
        document.getElementById('muteBtn').addEventListener('click', () => { video.muted = !video.muted; document.getElementById('volumeIcon').className = video.muted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill'; document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume; });
        document.getElementById('volumeSlider').addEventListener('input', (e) => { video.volume = parseFloat(e.target.value); video.muted = video.volume===0; document.getElementById('volumeIcon').className = video.volume===0 ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill'; });
        document.getElementById('brightnessSlider').addEventListener('input', (e) => video.style.filter = `brightness(${e.target.value})`);
        document.getElementById('brightnessBtn').addEventListener('click', () => { document.getElementById('brightnessSlider').value = 1; video.style.filter = 'brightness(1)'; });
        document.getElementById('fullscreenBtn').addEventListener('click', () => video.requestFullscreen?.());
        document.getElementById('autoPlayNext').addEventListener('change', e => autoPlayNext = e.target.checked);
        document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') searchChannels(); });
        document.addEventListener('fullscreenchange', () => {
            if(document.fullscreenElement) document.addEventListener('wheel', (e) => { if(document.fullscreenElement){ e.preventDefault(); e.deltaY>0 ? playNextChannel() : playPreviousChannel(); } });
            else document.removeEventListener('wheel', ()=>{});
        });
        video.volume = 1;
    });

    window.switchChannelType = switchChannelType;
    window.searchChannels = searchChannels;
    window.toggleGroup = toggleGroup;
    window.toggleVodGroup = toggleVodGroup;
</script>
</body>
</html>
