<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯 {{ filename }}</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>" type="image/svg+xml">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Roboto, 'Segoe UI', sans-serif;
        }
        .editor-container { 
            max-width: 1200px; 
            margin: 2rem auto; 
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        textarea { 
            font-family: 'Courier New', monospace; 
            font-size: 14px; 
            line-height: 1.5;
        }
        .alert {
            margin-bottom: 1.5rem;
        }
    </style>
    <script>
        async function saveContent(event, endpoint) {
            event.preventDefault();
            
            const content = document.querySelector('textarea[name="content"]').value;
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: content
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('错误: ' + result.error);
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('网络错误: ' + error);
            }
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/config/mappings">
                <i class="bi bi-arrow-left"></i> 返回
            </a>
        </div>
    </nav>

    <div class="editor-container">
        <div class="card">
            <div class="card-header">
                <div class="editor-header">
                    <h4 class="mb-0"><i class="bi bi-file-text"></i> 編輯 {{ filename }}</h4>
                    <a href="/config/mappings" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 返回
                    </a>
                </div>
            </div>
            <div class="card-body">
                {% if message %}
                <div class="alert alert-info">{{ message }}</div>
                {% endif %}
                
                <form onsubmit="saveContent(event, '/config/save-txt')">
                    <div class="mb-3">
                        <label class="form-label">档案内容:</label>
                        <textarea 
                            class="form-control" 
                            name="content" 
                            rows="25" 
                            style="font-family: 'Courier New', monospace;"
                        >{{ content }}</textarea>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/config/mappings" class="btn btn-secondary me-md-2">取消</a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> 儲存更改
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
